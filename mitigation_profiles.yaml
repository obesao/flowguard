# mitigation_profiles.yaml — estratégia de mitigação sugerida (aba Ataques >
# Aplicar Sugestão) por tipo de ataque:
#   rtbh        - blackhole total do prefixo via BGP (mais agressivo)
#   discard     - FlowSpec: descarta só o tráfego que casa o padrão do ataque
#   rate_limit  - FlowSpec: não descarta, só limita a banda do tráfego que casa
# pkt_len_min (bytes) e rate_limit_mbps são os parâmetros de intensidade do filtro.
# auto_mode - dispara a mitigação sozinha na abertura do ataque, sem clique manual:
#   off        - nunca dispara sozinho (padrão)
#   suggestion - aplica o kind acima automaticamente (Aplicar Sugestão automático)
#   rtbh       - bloqueia o prefixo inteiro automaticamente (Mitigar automático)
# Só tem efeito nos prefixos com auto_mitigate: true em protected_prefixes.yaml.
# rtbh_default_ttl_s - duração padrão (segundos) do bloqueio RTBH (botão "Mitigar"
#   e auto_mode=rtbh) antes de expirar e ser retirado sozinho. Chave global, não é
#   por tipo de ataque. FlowSpec continua usando mitigation.default_ttl_s (config.yaml).
# Editável via portal (aba Configuração > Mitigação) ou flowguard-cli mitigation set.
# Chave/campo ausente ou arquivo inexistente = comportamento original.
ddos_volumetrico:
  kind: rtbh
  rate_limit_mbps: 100.0
  auto_mode: suggestion
dns_amp:
  kind: rtbh
  pkt_len_min: 512
  rate_limit_mbps: 50
  auto_mode: suggestion
ntp_amp:
  kind: discard
  pkt_len_min: 400
  rate_limit_mbps: 50
  auto_mode: suggestion
ssdp_amp:
  kind: discard
  rate_limit_mbps: 50
  auto_mode: suggestion
memcached_amp:
  kind: discard
  rate_limit_mbps: 50
  auto_mode: suggestion
cldap_amp:
  kind: discard
  rate_limit_mbps: 50
  auto_mode: suggestion
anomalia_baseline:
  kind: discard
  rate_limit_mbps: 50
  auto_mode: suggestion
rtbh_default_ttl_s: 300
