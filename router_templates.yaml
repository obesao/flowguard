# router_templates.yaml — templates de configuração do roteador de borda (VRP),
# usados pela tela "Config. Roteador" do portal (protegida pela senha do Modo
# Guerra). Cada template define os campos aceitos (com tipo/validação) e os
# comandos VRP finais com placeholders — NUNCA aceite um novo template que
# monte comando por concatenação de string sem passar pelos tipos validados em
# routercfg/templates.py.
#
# `undo_commands` é obrigatório em todo template — é o que a reversão
# automática usa quando o rollback point nativo do equipamento não está
# disponível (ver routercfg/apply.py).
#
# Tipos de campo suportados: ipv4, ipv4_cidr (gera automaticamente
# {campo}_network, {campo}_mask e {campo}_wildcard), interface_name,
# text_safe, enum (com "options" e opcionalmente "command_map" -> gera
# {campo}_cmd, e "undo_command_map" -> gera {campo}_undo_cmd, pro caso — como
# up/down de sessão BGP — em que a reversão de cada opção é simplesmente a
# outra opção, sem precisar capturar estado anterior), int_range (com
# "min"/"max").
#
# bgp_peer_toggle/bgp_prefix_advertise usam "as_number" (AS local, não o do
# peer) e "peer_ip"/"prefix" que o portal preenche a partir da descoberta real
# da config (botão "Ler configuração atual (BGP)", ver routercfg/discovery.py)
# — mas o backend valida esses campos exatamente como qualquer outro, não
# confia cegamente no que a descoberta devolveu.
#
# Sintaxe VRP abaixo é a típica documentada pela Huawei pra essa família de
# equipamento — validar contra a versão de software real do NE8000 antes de
# usar em produção (mesmo cuidado já adotado antes pros comandos de NetStream
# passados manualmente ao operador).

templates:
  - id: netflow_export
    label: "Exportação de NetFlow"
    category: monitoramento
    description: >
      Configura a exportação de NetStream (NetFlow) global e habilita nas
      interfaces informadas — resolve a configuração que hoje é feita manualmente
      no roteador pra alimentar o FlowGuard.
    device_name: "NE8000BGP"
    fields:
      - name: collector_ip
        label: "IP do coletor (FlowGuard)"
        type: ipv4
        required: true
      - name: collector_port
        label: "Porta UDP do coletor"
        type: int_range
        min: 1
        max: 65535
        default: 2055
        required: true
      - name: interface
        label: "Interface a monitorar"
        type: interface_name
        required: true
        help: "ex: GigabitEthernet0/0/1"
    commands:
      - "ip netstream export host {collector_ip} {collector_port}"
      - "ip netstream export version 9"
      - "interface {interface}"
      - "netstream inbound"
      - "netstream outbound"
      - "quit"
    undo_commands:
      - "interface {interface}"
      - "undo netstream inbound"
      - "undo netstream outbound"
      - "quit"
      - "undo ip netstream export host {collector_ip} {collector_port}"

  - id: static_route
    label: "Rota estática"
    category: roteamento
    description: "Adiciona uma rota estática (ip route-static)."
    device_name: "NE8000BGP"
    fields:
      - name: dest
        label: "Destino (CIDR)"
        type: ipv4_cidr
        required: true
        help: "ex: 203.0.113.0/24"
      - name: next_hop
        label: "Próximo salto"
        type: ipv4
        required: true
    commands:
      - "ip route-static {dest_network} {dest_mask} {next_hop}"
    undo_commands:
      - "undo ip route-static {dest_network} {dest_mask} {next_hop}"

  - id: prefix_acl
    label: "ACL simples por prefixo de origem"
    category: seguranca
    description: >
      Cria/ajusta uma regra numa ACL básica (2000-2999) pra permitir ou negar
      tráfego a partir de um prefixo de origem.
    device_name: "NE8000BGP"
    fields:
      - name: acl_number
        label: "Número da ACL básica"
        type: int_range
        min: 2000
        max: 2999
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["permit", "deny"]
        required: true
      - name: source
        label: "Prefixo de origem (CIDR)"
        type: ipv4_cidr
        required: true
    commands:
      - "acl {acl_number}"
      - "rule {action} source {source_network} {source_wildcard}"
      - "quit"
    undo_commands:
      - "acl {acl_number}"
      - "undo rule {action} source {source_network} {source_wildcard}"
      - "quit"

  - id: interface_desc_state
    label: "Descrição e estado de interface"
    category: interfaces
    description: >
      Define a descrição de uma interface e se ela deve ficar administrativamente
      ativa (up) ou desativada (down). Atenção: a reversão automática deste
      template não restaura o estado/descrição anteriores (não são capturados
      antes da mudança) — ela remove a descrição e deixa a interface "up" por
      segurança. Pra reversão fiel, dependa do ponto de rollback nativo do
      equipamento (criado automaticamente antes de aplicar, quando suportado).
    device_name: "NE8000BGP"
    fields:
      - name: interface
        label: "Interface"
        type: interface_name
        required: true
      - name: description
        label: "Descrição"
        type: text_safe
        required: true
      - name: admin_state
        label: "Estado administrativo"
        type: enum
        options: ["up", "down"]
        default: "up"
        required: true
        command_map:
          up: "undo shutdown"
          down: "shutdown"
    commands:
      - "interface {interface}"
      - "description {description}"
      - "{admin_state_cmd}"
      - "quit"
    undo_commands:
      - "interface {interface}"
      - "undo description"
      - "undo shutdown"
      - "quit"

  - id: bgp_peer_toggle
    label: "Subir/derrubar sessão BGP com uma operadora"
    category: bgp
    description: >
      Suspende ou reativa a sessão BGP com um peer específico via "peer
      ignore" (não remove a configuração do peer, só para de tentar
      estabelecer/manter a sessão TCP) — pensado pra manutenção com uma
      operadora específica sem mexer nas outras. Use "Ler configuração atual
      (BGP)" no portal pra escolher o peer certo em vez de digitar o IP.
    device_name: "NE8000BGP"
    fields:
      - name: as_number
        label: "AS local"
        type: int_range
        min: 1
        max: 4294967295
        required: true
      - name: peer_ip
        label: "IP do peer (operadora)"
        type: ipv4
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["up", "down"]
        required: true
        command_map:
          up: "undo peer {peer_ip} ignore"
          down: "peer {peer_ip} ignore"
        undo_command_map:
          up: "peer {peer_ip} ignore"
          down: "undo peer {peer_ip} ignore"
    commands:
      - "bgp {as_number}"
      - "{action_cmd}"
      - "quit"
    undo_commands:
      - "bgp {as_number}"
      - "{action_undo_cmd}"
      - "quit"

  - id: bgp_prefix_advertise
    label: "Anunciar/remover prefixo da lista de IPs advertidos (BGP)"
    category: bgp
    description: >
      Adiciona ou remove um "network" da lista de prefixos anunciados via BGP
      — afeta o anúncio pra TODOS os peers (não é filtro por operadora
      específica). Use "Ler configuração atual (BGP)" no portal pra escolher
      um prefixo já anunciado em vez de digitar na mão. Atenção: se o
      "network" original tinha uma route-policy associada (atributos
      customizados), o comando de reversão volta a anunciar o prefixo sem
      essa route-policy — confira depois de reverter.
    device_name: "NE8000BGP"
    fields:
      - name: as_number
        label: "AS local"
        type: int_range
        min: 1
        max: 4294967295
        required: true
      - name: prefix
        label: "Prefixo (CIDR)"
        type: ipv4_cidr
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["announce", "withdraw"]
        required: true
        command_map:
          announce: "network {prefix_network} {prefix_mask}"
          withdraw: "undo network {prefix_network} {prefix_mask}"
        undo_command_map:
          announce: "undo network {prefix_network} {prefix_mask}"
          withdraw: "network {prefix_network} {prefix_mask}"
    commands:
      - "bgp {as_number}"
      - "{action_cmd}"
      - "quit"
    undo_commands:
      - "bgp {as_number}"
      - "{action_undo_cmd}"
      - "quit"

  - id: vlan_create_toggle
    label: "Criar/remover VLAN"
    category: vlan
    description: "Cria ou remove uma VLAN no nível global do equipamento."
    device_name: "NE8000BGP"
    fields:
      - name: vlan_id
        label: "VLAN ID"
        type: int_range
        min: 1
        max: 4094
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["create", "remove"]
        required: true
        command_map:
          create: "vlan {vlan_id}"
          remove: "undo vlan {vlan_id}"
        undo_command_map:
          create: "undo vlan {vlan_id}"
          remove: "vlan {vlan_id}"
    commands:
      - "{action_cmd}"
      - "quit"
    undo_commands:
      - "{action_undo_cmd}"
      - "quit"

  - id: vlan_trunk_toggle
    label: "Adicionar/remover VLAN de uma porta trunk"
    category: vlan
    description: >
      Adiciona ou remove uma VLAN da lista "allow-pass" de uma porta já
      configurada como trunk — não muda o link-type da porta (se ela não for
      trunk ainda, aplique isso depois de configurar o trunk manualmente).
    device_name: "NE8000BGP"
    fields:
      - name: interface
        label: "Interface (porta trunk)"
        type: interface_name
        required: true
      - name: vlan_id
        label: "VLAN ID"
        type: int_range
        min: 1
        max: 4094
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["add", "remove"]
        required: true
        command_map:
          add: "port trunk allow-pass vlan {vlan_id}"
          remove: "undo port trunk allow-pass vlan {vlan_id}"
        undo_command_map:
          add: "undo port trunk allow-pass vlan {vlan_id}"
          remove: "port trunk allow-pass vlan {vlan_id}"
    commands:
      - "interface {interface}"
      - "{action_cmd}"
      - "quit"
    undo_commands:
      - "interface {interface}"
      - "{action_undo_cmd}"
      - "quit"

  - id: interface_ip_toggle
    label: "Adicionar/remover IP de uma interface"
    category: interface
    description: "Adiciona ou remove um endereço IP de uma interface ou sub-interface existente."
    device_name: "NE8000BGP"
    fields:
      - name: interface
        label: "Interface"
        type: interface_name
        required: true
      - name: ip
        label: "IP (CIDR)"
        type: ipv4_cidr
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["add", "remove"]
        required: true
        command_map:
          add: "ip address {ip_network} {ip_mask}"
          remove: "undo ip address {ip_network} {ip_mask}"
        undo_command_map:
          add: "undo ip address {ip_network} {ip_mask}"
          remove: "ip address {ip_network} {ip_mask}"
    commands:
      - "interface {interface}"
      - "{action_cmd}"
      - "quit"
    undo_commands:
      - "interface {interface}"
      - "{action_undo_cmd}"
      - "quit"

  - id: vlan_subinterface_create
    label: "Criar sub-interface VLAN (802.1Q)"
    category: interface
    description: >
      Cria uma sub-interface com encapsulamento dot1q e atribui um IP — uso
      típico: provisionar um cliente/serviço novo numa VLAN. Reversão remove
      a sub-interface inteira.
    device_name: "NE8000BGP"
    fields:
      - name: interface
        label: "Interface física"
        type: interface_name
        required: true
      - name: vlan_id
        label: "VLAN ID"
        type: int_range
        min: 1
        max: 4094
        required: true
      - name: ip
        label: "IP (CIDR)"
        type: ipv4_cidr
        required: true
    commands:
      - "interface {interface}.{vlan_id}"
      - "vlan-type dot1q {vlan_id}"
      - "ip address {ip_network} {ip_mask}"
      - "quit"
    undo_commands:
      - "undo interface {interface}.{vlan_id}"

  - id: vlan_subinterface_remove
    label: "Remover sub-interface VLAN"
    category: interface
    description: >
      Remove uma sub-interface inteira (802.1Q). Atenção: a reversão
      automática recria a sub-interface vazia (sem VLAN/IP configurados) —
      não restaura a config original. Pra reversão fiel, dependa do ponto de
      rollback nativo do equipamento (criado automaticamente antes de
      aplicar, quando suportado).
    device_name: "NE8000BGP"
    fields:
      - name: interface
        label: "Interface física"
        type: interface_name
        required: true
      - name: vlan_id
        label: "VLAN ID"
        type: int_range
        min: 1
        max: 4094
        required: true
    commands:
      - "undo interface {interface}.{vlan_id}"
    undo_commands:
      - "interface {interface}.{vlan_id}"
      - "quit"
