# router_templates.yaml — templates de configuração do roteador de borda (VRP),
# usados pela tela "Config. Roteador" do portal (protegida pela senha do Modo
# Guerra). Cada template define os campos aceitos (com tipo/validação) e os
# comandos VRP finais com placeholders — NUNCA aceite um novo template que
# monte comando por concatenação de string sem passar pelos tipos validados em
# routercfg/templates.py.
#
# `undo_commands` é obrigatório em todo template — é o que a reversão
# automática usa quando o rollback point nativo do equipamento não está
# disponível (ver routercfg/apply.py).
#
# Tipos de campo suportados: ipv4, ipv4_cidr (gera automaticamente
# {campo}_network, {campo}_mask e {campo}_wildcard), interface_name,
# text_safe, enum (com "options" e opcionalmente "command_map" -> gera
# {campo}_cmd), int_range (com "min"/"max").
#
# Sintaxe VRP abaixo é a típica documentada pela Huawei pra essa família de
# equipamento — validar contra a versão de software real do NE8000 antes de
# usar em produção (mesmo cuidado já adotado antes pros comandos de NetStream
# passados manualmente ao operador).

templates:
  - id: netflow_export
    label: "Exportação de NetFlow"
    category: monitoramento
    description: >
      Configura a exportação de NetStream (NetFlow) global e habilita nas
      interfaces informadas — resolve a configuração que hoje é feita manualmente
      no roteador pra alimentar o FlowGuard.
    device_name: "NE8000 borda"
    fields:
      - name: collector_ip
        label: "IP do coletor (FlowGuard)"
        type: ipv4
        required: true
      - name: collector_port
        label: "Porta UDP do coletor"
        type: int_range
        min: 1
        max: 65535
        default: 2055
        required: true
      - name: interface
        label: "Interface a monitorar"
        type: interface_name
        required: true
        help: "ex: GigabitEthernet0/0/1"
    commands:
      - "ip netstream export host {collector_ip} {collector_port}"
      - "ip netstream export version 9"
      - "interface {interface}"
      - "netstream inbound"
      - "netstream outbound"
      - "quit"
    undo_commands:
      - "interface {interface}"
      - "undo netstream inbound"
      - "undo netstream outbound"
      - "quit"
      - "undo ip netstream export host {collector_ip} {collector_port}"

  - id: static_route
    label: "Rota estática"
    category: roteamento
    description: "Adiciona uma rota estática (ip route-static)."
    device_name: "NE8000 borda"
    fields:
      - name: dest
        label: "Destino (CIDR)"
        type: ipv4_cidr
        required: true
        help: "ex: 203.0.113.0/24"
      - name: next_hop
        label: "Próximo salto"
        type: ipv4
        required: true
    commands:
      - "ip route-static {dest_network} {dest_mask} {next_hop}"
    undo_commands:
      - "undo ip route-static {dest_network} {dest_mask} {next_hop}"

  - id: prefix_acl
    label: "ACL simples por prefixo de origem"
    category: seguranca
    description: >
      Cria/ajusta uma regra numa ACL básica (2000-2999) pra permitir ou negar
      tráfego a partir de um prefixo de origem.
    device_name: "NE8000 borda"
    fields:
      - name: acl_number
        label: "Número da ACL básica"
        type: int_range
        min: 2000
        max: 2999
        required: true
      - name: action
        label: "Ação"
        type: enum
        options: ["permit", "deny"]
        required: true
      - name: source
        label: "Prefixo de origem (CIDR)"
        type: ipv4_cidr
        required: true
    commands:
      - "acl {acl_number}"
      - "rule {action} source {source_network} {source_wildcard}"
      - "quit"
    undo_commands:
      - "acl {acl_number}"
      - "undo rule {action} source {source_network} {source_wildcard}"
      - "quit"

  - id: interface_desc_state
    label: "Descrição e estado de interface"
    category: interfaces
    description: >
      Define a descrição de uma interface e se ela deve ficar administrativamente
      ativa (up) ou desativada (down). Atenção: a reversão automática deste
      template não restaura o estado/descrição anteriores (não são capturados
      antes da mudança) — ela remove a descrição e deixa a interface "up" por
      segurança. Pra reversão fiel, dependa do ponto de rollback nativo do
      equipamento (criado automaticamente antes de aplicar, quando suportado).
    device_name: "NE8000 borda"
    fields:
      - name: interface
        label: "Interface"
        type: interface_name
        required: true
      - name: description
        label: "Descrição"
        type: text_safe
        required: true
      - name: admin_state
        label: "Estado administrativo"
        type: enum
        options: ["up", "down"]
        default: "up"
        required: true
        command_map:
          up: "undo shutdown"
          down: "shutdown"
    commands:
      - "interface {interface}"
      - "description {description}"
      - "{admin_state_cmd}"
      - "quit"
    undo_commands:
      - "interface {interface}"
      - "undo description"
      - "undo shutdown"
      - "quit"
