daemon:
  pid_file: /var/run/flowguard.pid
  socket: /var/run/flowguard.sock
  log_file: /var/log/flowguard.log
  log_level: info
collector:
  netflow_port: 2055
  sflow_port: 6343
  ipfix_port: 9995
  bind_ip: 10.77.10.2
  sampling_rate: 1000
  buffer_size: 65536
database:
  path: /root/flowguard/db/flows.sqlite
  retention_days: 14
  aggregate_interval_s: 30
detection:
  ddos_pps_threshold: 100000
  ddos_bps_threshold: 500000000
  syn_ratio_threshold: 0.9
  # piso de pps de TCP total no prefixo antes de avaliar a proporção de SYN acima —
  # sem isso, um prefixo quase sem tráfego TCP dispara com poucos pacotes (proporção
  # alta por acaso, não por ataque de verdade)
  syn_min_pps_floor: 500
  dns_amp_factor: 10
  scan_ports_per_sec: 50
  scan_hosts_per_sec: 100
  min_attack_duration_s: 10
  # rede de segurança: fecha sozinho um ataque sem reconfirmação de tráfego há mais
  # desse tempo (ver collector/storage.py::close_stale_attacks) — cobre o caso raro
  # em que a engine parou de reavaliar a chave (prefixo removido de
  # protected_prefixes, reload/restart no meio do ataque) e a linha ficaria "ativa"
  # pra sempre no portal/CLI mesmo com a mitigação já expirada há muito tempo.
  attack_stale_close_s: 21600
  baseline_min_duration_s: 120
  window_short_s: 30
  window_long_s: 300
  baseline_enabled: true
  baseline_window_minutes: 180
  baseline_min_samples: 120
  baseline_sigma: 8
  baseline_min_bps: 5000000
mitigation:
  auto_mode: false
  default_ttl_s: 3600
  max_rules: 50
bgp:
  exabgp_socket: /var/run/exabgp.sock
  speaker_log_file: /var/log/flowguard-speaker.log
  router_id: 10.77.10.2
  local_as: 262620
  peer_ip: 10.77.10.1
  rtbh_community: 2626:669
  nexthop_blackhole: 10.77.10.2
  # segunda sessão BGP (mesmo exabgp.conf, mesmo processo) — NE8000-PPPOE, único
  # ponto da rede onde o IP do cliente CGNAT ainda é o privado (100.64.0.0/10),
  # antes do A10 traduzir pra público. RTBH continua só no peer 'main' (conceito
  # de blackhole de borda, não se aplica aqui); FlowSpec por src_prefix pra
  # mitigar cliente abusivo usa este peer (bgp/manager.py resolve por nome:
  # flowspec_add(..., peer="pppoe")).
  peer_ip_pppoe: 10.70.70.1
  # equipamento em warmode.yaml correspondente a cada peer, usado só pra
  # verificação via SSH de uma regra (bgp/manager.py.verify_rule) — não afeta
  # a sessão BGP em si. 'main' não precisa de entrada aqui (routercfg/apply.py
  # já usa NE8000BGP como default); confirmado que são equipamentos DIFERENTES
  # (management IPs distintos em warmode.yaml), não o mesmo NE8000 com 2 peers.
  peer_device_pppoe: HUAWEI-PPPOE-222
ai:
  enabled: true
  env_file: /root/ai/.env
  model_events: claude-haiku-4-5-20251001
  model_report: claude-sonnet-4-6
  min_severity: high
  hourly_report: true
  rate_limit_rpm: 5
protected_prefixes_file: /root/flowguard/protected_prefixes.yaml
whitelist_file: /root/flowguard/whitelist.yaml
detection_toggles_file: /root/flowguard/detection_toggles.yaml
mitigation_profiles_file: /root/flowguard/mitigation_profiles.yaml
# perfis de limiar de detecção reutilizáveis por tipo de rede/prefixo (ex.: pool
# CGNAT com tráfego agregado bem acima de 1 cliente único), atribuídos por prefixo
# via `template:` em protected_prefixes.yaml — ver detection_templates.yaml e
# analyzer/engine.py::evaluate_cycle.
detection_templates_file: /root/flowguard/detection_templates.yaml
# ajuste fino dos limiares de detection.* abaixo, editável via portal (aba
# Configuração > FlowGuard) ou flowguard-cli, aplicado a cada carga/reload (sem
# reiniciar o daemon) — arquivo ausente/vazio = usa os valores abaixo sem ajuste.
detection_overrides_file: /root/flowguard/detection_overrides.yaml
threat_feeds:
  enabled: true
  update_interval_h: 6
  cache_file: /root/flowguard/db/threat_ips.txt
  sources:
  - https://feodotracker.abuse.ch/downloads/ipblocklist.txt
  - https://raw.githubusercontent.com/stamparm/ipsum/master/levels/3.txt
  - https://www.spamhaus.org/drop/drop.txt
  - https://www.spamhaus.org/drop/edrop.txt
geoip:
  asn_db: /usr/share/GeoIP/GeoLite2-ASN.mmdb
  country_db: /usr/share/GeoIP/GeoLite2-Country.mmdb
alerts:
  whatsapp: true
  min_severity_wa: high
  webhook_url: ''
